<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0F1E52">
<title>UA — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0F1E52;
    color: #F0F4FF;
    font-family: 'DM Sans', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    text-align: center;
    padding: 24px;
  }
  h1 { font-size: 24px; margin-bottom: 12px; font-weight: 700; }
  p { color: #8899CC; font-size: 15px; line-height: 1.5; }
  .retry {
    margin-top: 24px;
    display: inline-block;
    padding: 12px 24px;
    background: #D4A843;
    color: #0F1E52;
    border-radius: 100px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-size: 15px;
  }
</style>
</head>
<body>
  <div>
    <h1>Sei offline</h1>
    <p>La dashboard e la lista lavori sono disponibili<br>se le hai visitate di recente.</p>
    <button class="retry" onclick="window.location.reload()">Riprova</button>
  </div>
</body>
</html>
