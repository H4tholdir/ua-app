name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: TypeScript + ESLint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Unit tests
        run: npx vitest run
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      NEXT_PUBLIC_APP_URL: https://uachelab.com
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      # Push notifications: chiavi placeholder per il build (lazy init nel codice)
      VAPID_PUBLIC_KEY: BPlaceholderVapidPublicKeyForCIBuildOnlyNotRealxxxxxxxxxxxx
      VAPID_PRIVATE_KEY: PlaceholderVapidPrivateKeyForCIBuildOnlyNotRealxxxxxxx
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BPlaceholderVapidPublicKeyForCIBuildOnlyNotRealxxxxxxxxxxxx
      # Resend placeholder
      RESEND_API_KEY: re_placeholder
      # Supabase service role placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Notify CI success
        if: success()
        run: echo "✅ Build passed — pronto per deploy"

      - name: Notify CI failure
        if: failure()
        run: |
          echo "❌ Build FALLITA su commit $(git rev-parse --short HEAD)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          exit 1
