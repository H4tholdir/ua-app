name: CD — Deploy to Vercel

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
      url: https://uachelab.com

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(npx vercel@latest deploy --prod --yes \
            --token="$VERCEL_TOKEN" \
            -m githubCommitAuthorName="H4tholdir" \
            -m githubCommitAuthorLogin="H4tholdir")
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deploy completato: $DEPLOY_URL"

      - name: Verify deployment health
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://uachelab.com" || echo "000")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
            echo "✅ uachelab.com risponde HTTP $STATUS — deploy in produzione verificato"
          else
            echo "⚠️ uachelab.com risponde HTTP $STATUS — verifica manualmente"
          fi

  skip-reason:
    name: CI fallita — deploy saltato
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'success'
    steps:
      - name: Log skip reason
        run: |
          echo "🚫 Deploy saltato: CI terminata con '${{ github.event.workflow_run.conclusion }}'"
          echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Correggi il CI prima di deployare in produzione."
          exit 1
