name: perf-budget

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci && npx playwright install chromium --with-deps
      # Soglie calibrate per il runner US (bias geografico ~+100-120ms/richiesta
      # vs budget utente 300/250/2000 misurati dall'Italia — rapporto P0-PERF §7):
      # funzione = allarme di regressione, non certificazione del budget utente.
      # Login (decisione ratificata 20/07/2026, opzione (c) panel §0C): misura
      # MULTI-RUN (5 giri, giro 0 warm-up scartato, MEDIANA dei 4) al posto della
      # singola n=1 che ha prodotto 2 falsi rossi (18-19/07: 4464ms di varianza
      # runner, collaudo reale Italia p75 1804ms ≤ 2000). FASE TRANSITORIA:
      # PERF_BUDGET_LOGIN_MODE=warn → lo sforamento login logga ma non blocca,
      # finché ~7-14 giorni di mediane multi-run non permettono la ricalibrazione
      # statistica della soglia (mediana storica + 15-20%); poi si rimuove il warn.
      # Baseline: leggere i log dei run («login→dashboard (giro N)» + mediana).
      - run: PERF_ENFORCE=1 PERF_BUDGET_TTFB=420 PERF_BUDGET_API=370 PERF_BUDGET_LOGIN=4000 PERF_BUDGET_LOGIN_MODE=warn npx tsx scripts/perf-audit.ts

  # Il fallimento del job genera la mail GitHub di default sui watcher del repo
  # — alerting minimo per il budget di performance, riserva sre R1 per canali dedicati.
